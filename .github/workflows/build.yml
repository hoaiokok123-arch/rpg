name: Build RPGPlayer IPA

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve SPM packages
        run: xcodebuild -resolvePackageDependencies -project RPGPlayer.xcodeproj -scheme RPGPlayer

      - name: Build iOS app (unsigned)
        run: |
          xcodebuild \
            -project RPGPlayer.xcodeproj \
            -scheme RPGPlayer \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            build

      - name: Create IPA manually
        run: |
          mkdir -p Payload
          APP_PATH="build/Build/Products/Release-iphoneos/RPGPlayer.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH="build/Release-iphoneos/RPGPlayer.app"
          fi
          cp -r "$APP_PATH" Payload/
          zip -r RPGPlayer.ipa Payload/

      - name: Upload RPGPlayer.ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPGPlayer-ipa
          path: RPGPlayer.ipa
          if-no-files-found: error
