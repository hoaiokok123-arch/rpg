name: Build RPGPlayer IPA

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve SPM packages
        run: xcodebuild -resolvePackageDependencies -project RPGPlayer.xcodeproj -scheme RPGPlayer

      - name: Build iOS app (unsigned)
        run: |
          xcodebuild \
            -project RPGPlayer.xcodeproj \
            -scheme RPGPlayer \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            build

      - name: Create IPA manually
        run: |
          rm -rf Payload
          rm -f RPGPlayer.ipa
          mkdir -p Payload
          APP_PATH="build/Build/Products/Release-iphoneos/RPGPlayer.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH="build/Release-iphoneos/RPGPlayer.app"
          fi
          EXECUTABLE_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist")
          if [ -z "$EXECUTABLE_NAME" ] || [ ! -f "$APP_PATH/$EXECUTABLE_NAME" ]; then
            echo "Invalid app bundle: missing executable '$EXECUTABLE_NAME' in $APP_PATH"
            /bin/ls -la "$APP_PATH"
            /usr/libexec/PlistBuddy -c "Print" "$APP_PATH/Info.plist" || true
            exit 1
          fi
          chmod 755 "$APP_PATH/$EXECUTABLE_NAME"
          file "$APP_PATH/$EXECUTABLE_NAME"
          cp -r "$APP_PATH" Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload RPGPlayer.ipa
          unzip -l RPGPlayer.ipa | sed -n '1,60p'

      - name: Upload RPGPlayer.ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPGPlayer-ipa
          path: RPGPlayer.ipa
          if-no-files-found: error
