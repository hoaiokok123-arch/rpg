name: RPGPlayer

options:
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  ZipArchive:
    url: https://github.com/ZipArchive/ZipArchive
    from: 2.6.0

targets:
  RPGPlayer:
    type: application
    platform: iOS
    sources:
      - path: Models
      - path: Services
      - path: Views
      - path: RPGPlayerApp.swift
    settings:
      base:
        PRODUCT_NAME: RPGPlayer
        PRODUCT_BUNDLE_IDENTIFIER: com.hoai90213.rpgplayer
        IPHONEOS_DEPLOYMENT_TARGET: 16.0
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
    dependencies:
      - package: ZipArchive
        product: ZipArchive
